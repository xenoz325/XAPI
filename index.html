<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XAPI Dashboard</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,Arial,sans-serif;
background:#07090d;
color:#fff;
}

header{
padding:35px;
text-align:center;
background:linear-gradient(135deg,#111827,#020617);
border-bottom:1px solid #222;
}

header h1{
font-size:48px;
margin:0;
letter-spacing:3px;
}

header p{
color:#9ca3af;
}

.container{
display:flex;
min-height:calc(100vh - 150px);
}

.sidebar{
width:280px;
background:#0b0f18;
padding:25px;
border-right:1px solid #1f2937;
}

.sidebar button{
width:100%;
margin-bottom:12px;
padding:15px;
border:none;
border-radius:12px;
background:#111827;
color:white;
cursor:pointer;
text-align:left;
font-size:15px;
transition:.2s;
}

.sidebar button:hover{
background:#2563eb;
}

.content{
flex:1;
padding:35px;
}

.panel{
background:#111827;
padding:25px;
border-radius:20px;
border:1px solid #1f2937;
max-width:700px;
}

input{
width:100%;
padding:14px;
margin-top:15px;
border-radius:12px;
border:none;
background:#020617;
color:white;
outline:none;
}

.action{
margin-top:15px;
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
}

.action:hover{
background:#1d4ed8;
}

.response{
margin-top:25px;
background:#020617;
padding:20px;
border-radius:15px;
border:1px solid #1f2937;
min-height:150px;
overflow:auto;
}

.hidden{
display:none;
}

.card-title{
font-size:25px;
margin-bottom:10px;
}
</style>

</head>

<body>

<header>
<h1>XAPI</h1>
<p>API Management Dashboard</p>
</header>


<div class="container">

<div class="sidebar">

<button onclick="openApi('qr')">QR Generator</button>

<button onclick="openApi('ip')">IP Tracker</button>

<button onclick="openApi('operator')">Operator Checker</button>

<button onclick="openApi('tiktok')">TikTok Downloader</button>

<button onclick="openApi('instagram')">Instagram Downloader</button>

<button onclick="openApi('youtube')">YouTube Downloader</button>

</div>


<div class="content">

<div class="panel">

<h2 id="title">Pilih API</h2>

<div id="formArea">
Pilih fitur API dari menu.
</div>


<div class="response">
<h3>Response</h3>
<pre id="result">Menunggu request...</pre>
</div>


</div>

</div>

</div>


<script>

let current="";


const apiData={

qr:{
title:"QR Generator",
placeholder:"Masukkan teks atau URL",
url:"/api/qr?text="
},

ip:{
title:"IP Tracker",
placeholder:"Masukkan IP Address",
url:"/api/ip?ip="
},

operator:{
title:"Cek Operator Nomor",
placeholder:"Masukkan nomor telepon",
url:"/api/operator?number="
},

tiktok:{
title:"TikTok Downloader",
placeholder:"Masukkan URL TikTok",
url:"/api/tiktok?url="
},

instagram:{
title:"Instagram Downloader",
placeholder:"Masukkan URL Instagram",
url:"/api/instagram?url="
},

youtube:{
title:"YouTube Downloader",
placeholder:"Masukkan URL YouTube",
url:"/api/youtube?url="
}

};


function openApi(name){

current=name;

let data=apiData[name];

document.getElementById("title").innerText=data.title;

document.getElementById("formArea").innerHTML=`

<input id="inputValue" placeholder="${data.placeholder}">

<button class="action" onclick="sendRequest()">
Send Request
</button>

`;

}


async function sendRequest(){

let value=document.getElementById("inputValue").value;

if(!value){
document.getElementById("result").innerText="Input masih kosong";
return;
}

let endpoint=
apiData[current].url+
encodeURIComponent(value);


try{

let res=await fetch(endpoint);

let data=await res.json();

document.getElementById("result").innerText=
JSON.stringify(data,null,2);

}

catch(e){

document.getElementById("result").innerText=
"Error: "+e.message;

}

}

</script>

</body>
</html>
